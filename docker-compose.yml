services:
  api:
    build: .
    container_name: crypto-quant-bot-api
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      BOT_API_HOST: 0.0.0.0
      BOT_API_PORT: 8899
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:8899:8899"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./configs:/app/configs:ro
    command: ["python", "run_api.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import json, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8899/health', timeout=3); raise SystemExit(0 if json.load(r).get('status') == 'ok' else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    mem_limit: 512m
    cpus: "1.0"

  realtime:
    build: .
    container_name: crypto-quant-bot-realtime
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./configs:/app/configs:ro
    command: ["python", "run_realtime.py"]
    stop_grace_period: 30s
    mem_limit: 768m
    cpus: "1.0"
